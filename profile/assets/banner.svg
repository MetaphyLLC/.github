<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" width="900" height="320">
  <defs>
    <radialGradient id="bgGrad" cx="28%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F1829"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <radialGradient id="tealHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D8C8C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3D8C8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="tealGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.24  0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0.8 0" result="tb"/>
      <feMerge><feMergeNode in="tb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.79  0 0 0 0 0.66  0 0 0 0 0.30  0 0 0 0.7 0" result="gb"/>
      <feMerge><feMergeNode in="gb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A67C3D"/>
      <stop offset="35%"  stop-color="#F5E6B8"/>
      <stop offset="65%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3D8C8C" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3D8C8C" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#3D8C8C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3D8C8C" stop-opacity="0"/>
    </linearGradient>
    <style>
      .spin-slow  { transform-origin:270px 160px; animation:spin 90s linear infinite; }
      .spin-rev   { transform-origin:270px 160px; animation:spin 130s linear infinite reverse; }
      .spin-small { transform-origin:270px 160px; animation:spin 45s linear infinite; }
      @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      .pulse { animation: pulse 5s ease-in-out infinite; }
      .pulse2 { animation: pulse 5s ease-in-out infinite; animation-delay:2.5s; }
      @keyframes pulse { 0%,100%{opacity:0.12} 50%{opacity:0.45} }
      .twinkle-a { animation: twk 3.2s ease-in-out infinite; }
      .twinkle-b { animation: twk 4.5s ease-in-out infinite; animation-delay:1.1s; }
      .twinkle-c { animation: twk 2.8s ease-in-out infinite; animation-delay:2.0s; }
      .twinkle-d { animation: twk 5.0s ease-in-out infinite; animation-delay:0.6s; }
      @keyframes twk { 0%,100%{opacity:0.15} 50%{opacity:0.95} }
      .shimmer { animation: shimmer 6s ease-in-out infinite; }
      @keyframes shimmer { 0%,100%{opacity:0.9} 50%{opacity:1} }
    </style>
  </defs>

  <!-- ─── Background ───────────────────────────────────────────── -->
  <rect width="900" height="320" fill="url(#bgGrad)"/>
  <ellipse cx="270" cy="160" rx="180" ry="170" fill="url(#tealHalo)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#3D8C8C" stroke-width="0.5">
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- Star field -->
  <circle cx="48"  cy="28"  r="1.5" fill="#E2E8F0" class="twinkle-a"/>
  <circle cx="820" cy="52"  r="1.2" fill="#E2E8F0" class="twinkle-b"/>
  <circle cx="755" cy="288" r="1.5" fill="#3D8C8C" class="twinkle-c"/>
  <circle cx="878" cy="195" r="1.0" fill="#C9A84C" class="twinkle-d"/>
  <circle cx="605" cy="18"  r="1.2" fill="#E2E8F0" class="twinkle-a"/>
  <circle cx="452" cy="298" r="1.5" fill="#3D8C8C" class="twinkle-b"/>
  <circle cx="32"  cy="200" r="1.0" fill="#C9A84C" class="twinkle-c"/>
  <circle cx="135" cy="292" r="1.2" fill="#E2E8F0" class="twinkle-d"/>
  <circle cx="860" cy="130" r="1.0" fill="#3D8C8C" class="twinkle-a"/>
  <circle cx="680" cy="305" r="1.2" fill="#C9A84C" class="twinkle-b"/>
  <circle cx="520" cy="8"   r="1.0" fill="#E2E8F0" class="twinkle-c"/>
  <circle cx="88"  cy="90"  r="0.8" fill="#3D8C8C" class="twinkle-d"/>

  <!-- ─── Outer pulsing halos ──────────────────────────────────── -->
  <circle cx="270" cy="160" r="148" fill="none" stroke="#3D8C8C" stroke-width="0.6" class="pulse"/>
  <circle cx="270" cy="160" r="132" fill="none" stroke="#3D8C8C" stroke-width="0.3" class="pulse2"/>

  <!-- ─── DODECAHEDRON PROJECTION ──────────────────────────────── -->
  <!-- Outer Pentagon  R=120 (teal, spins slowly) -->
  <!-- Vertices: V0(270,40) V1(384,123) V2(341,257) V3(199,257) V4(156,123) -->
  <g class="spin-slow">
    <polygon points="270,40 384,123 341,257 199,257 156,123"
      fill="none" stroke="#3D8C8C" stroke-width="1.4" opacity="0.85"
      filter="url(#tealGlow)"/>
    <circle cx="270" cy="40"  r="3" fill="#3D8C8C" opacity="0.9" filter="url(#tealGlow)"/>
    <circle cx="384" cy="123" r="3" fill="#3D8C8C" opacity="0.9" filter="url(#tealGlow)"/>
    <circle cx="341" cy="257" r="3" fill="#3D8C8C" opacity="0.9" filter="url(#tealGlow)"/>
    <circle cx="199" cy="257" r="3" fill="#3D8C8C" opacity="0.9" filter="url(#tealGlow)"/>
    <circle cx="156" cy="123" r="3" fill="#3D8C8C" opacity="0.9" filter="url(#tealGlow)"/>
  </g>

  <!-- Inner Pentagon R=75 rotated 36° (gold, counter-spins) -->
  <!-- Vertices: V0(314,99) V1(341,183) V2(270,235) V3(199,183) V4(226,99) -->
  <g class="spin-rev">
    <polygon points="314,99 341,183 270,235 199,183 226,99"
      fill="rgba(201,168,76,0.05)" stroke="#C9A84C" stroke-width="1.1" opacity="0.85"
      filter="url(#goldGlow)"/>
    <circle cx="314" cy="99"  r="2.2" fill="#C9A84C" opacity="0.85" filter="url(#goldGlow)"/>
    <circle cx="341" cy="183" r="2.2" fill="#C9A84C" opacity="0.85" filter="url(#goldGlow)"/>
    <circle cx="270" cy="235" r="2.2" fill="#C9A84C" opacity="0.85" filter="url(#goldGlow)"/>
    <circle cx="199" cy="183" r="2.2" fill="#C9A84C" opacity="0.85" filter="url(#goldGlow)"/>
    <circle cx="226" cy="99"  r="2.2" fill="#C9A84C" opacity="0.85" filter="url(#goldGlow)"/>
  </g>

  <!-- Connecting edges between outer and inner pentagons (dodecahedron edges) -->
  <g class="spin-slow" opacity="0.28" stroke="#3D8C8C" stroke-width="0.7">
    <line x1="270" y1="40"  x2="314" y2="99"/>
    <line x1="270" y1="40"  x2="226" y2="99"/>
    <line x1="384" y1="123" x2="314" y2="99"/>
    <line x1="384" y1="123" x2="341" y2="183"/>
    <line x1="341" y1="257" x2="341" y2="183"/>
    <line x1="341" y1="257" x2="270" y2="235"/>
    <line x1="199" y1="257" x2="270" y2="235"/>
    <line x1="199" y1="257" x2="199" y2="183"/>
    <line x1="156" y1="123" x2="199" y2="183"/>
    <line x1="156" y1="123" x2="226" y2="99"/>
  </g>

  <!-- Small center pentagon R=35 (teal, spins same as outer) -->
  <!-- Vertices: V0(270,125) V1(303,149) V2(291,188) V3(249,188) V4(237,149) -->
  <g class="spin-small">
    <polygon points="270,125 303,149 291,188 249,188 237,149"
      fill="rgba(61,140,140,0.08)" stroke="#3D8C8C" stroke-width="1.0" opacity="0.7"
      filter="url(#tealGlow)"/>
  </g>

  <!-- Center dot -->
  <circle cx="270" cy="160" r="5" fill="#C9A84C" filter="url(#goldGlow)"/>
  <circle cx="270" cy="160" r="10" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <circle cx="270" cy="160" r="18" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.2"/>

  <!-- ─── Vertical divider ──────────────────────────────────────── -->
  <line x1="488" y1="35" x2="488" y2="285" stroke="#3D8C8C" stroke-width="0.6" opacity="0.3"/>

  <!-- ─── Right: Text ───────────────────────────────────────────── -->

  <!-- Company Name -->
  <text x="694" y="113"
    font-family="Georgia,'Times New Roman',serif"
    font-size="50" font-weight="bold"
    fill="url(#goldText)"
    text-anchor="middle"
    filter="url(#goldGlow)"
    class="shimmer">METAPHY LLC</text>

  <!-- Subtitle -->
  <text x="694" y="144"
    font-family="Georgia,'Times New Roman',serif"
    font-size="11" letter-spacing="5"
    fill="#3D8C8C" text-anchor="middle">METAPHYSICS AND COMPUTING</text>

  <!-- Separator line -->
  <line x1="510" y1="160" x2="878" y2="160" stroke="url(#divLine)" stroke-width="0.8"/>

  <!-- Axiom line 1 -->
  <text x="694" y="183"
    font-family="Georgia,'Times New Roman',serif"
    font-size="12.5" font-style="italic"
    fill="#94A3B8" text-anchor="middle">&#8220; Just because there is nothing there</text>

  <!-- Axiom line 2 -->
  <text x="694" y="201"
    font-family="Georgia,'Times New Roman',serif"
    font-size="12.5" font-style="italic"
    fill="#94A3B8" text-anchor="middle">does not mean there is not a thing there. &#8221;</text>

  <!-- Gold accent line under axiom -->
  <line x1="620" y1="216" x2="768" y2="216" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- Tagline -->
  <text x="694" y="238"
    font-family="Georgia,'Times New Roman',serif"
    font-size="11" fill="#D8D5CF" text-anchor="middle" opacity="0.85">
    Quantum Intelligence &#183; Photonic Systems &#183; Sacred Geometry
  </text>

  <!-- Footer label -->
  <text x="694" y="272"
    font-family="Georgia,'Times New Roman',serif"
    font-size="10" letter-spacing="3"
    fill="#3D8C8C" text-anchor="middle" opacity="0.9">
    &#11042; WHERE PHILOSOPHY MEETS ENGINEERING &#11042;
  </text>
</svg>