<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" width="900" height="520">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0F1829"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D8C8C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3D8C8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="tg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.55 0 0 0 0 0.55 0 0 0 0.8 0" result="tb"/>
      <feMerge><feMergeNode in="tb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.79 0 0 0 0 0.66 0 0 0 0 0.30 0 0 0 0.7 0" result="gb"/>
      <feMerge><feMergeNode in="gb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A67C3D"/>
      <stop offset="38%" stop-color="#F5E6B8"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D8C8C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3D8C8C" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#3D8C8C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3D8C8C" stop-opacity="0"/>
    </linearGradient>
    <style>
      .sr{transform-origin:450px 295px;animation:spin 90s linear infinite}
      .srr{transform-origin:450px 295px;animation:spin 130s linear infinite reverse}
      .ss{transform-origin:450px 295px;animation:spin 40s linear infinite}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      .p{animation:pulse 5s ease-in-out infinite}
      .p2{animation:pulse 5s ease-in-out infinite;animation-delay:2.5s}
      @keyframes pulse{0%,100%{opacity:.1}50%{opacity:.4}}
      .ta{animation:twk 3.2s ease-in-out infinite}
      .tb{animation:twk 4.5s ease-in-out infinite;animation-delay:1.1s}
      .tc{animation:twk 2.8s ease-in-out infinite;animation-delay:2s}
      .td{animation:twk 5s ease-in-out infinite;animation-delay:.6s}
      @keyframes twk{0%,100%{opacity:.15}50%{opacity:.9}}
      .sh{animation:sh 7s ease-in-out infinite}
      @keyframes sh{0%,100%{opacity:.88}50%{opacity:1}}
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)"/>
  <ellipse cx="450" cy="295" rx="250" ry="220" fill="url(#halo)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#3D8C8C" stroke-width="0.5">
    <line x1="0" y1="130" x2="900" y2="130"/><line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="150" y1="0" x2="150" y2="520"/><line x1="300" y1="0" x2="300" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/><line x1="600" y1="0" x2="600" y2="520"/>
    <line x1="750" y1="0" x2="750" y2="520"/>
  </g>

  <!-- Stars -->
  <circle cx="80"  cy="40"  r="1.5" fill="#E2E8F0" class="ta"/>
  <circle cx="820" cy="55"  r="1.2" fill="#E2E8F0" class="tb"/>
  <circle cx="760" cy="478" r="1.5" fill="#3D8C8C" class="tc"/>
  <circle cx="875" cy="200" r="1.0" fill="#C9A84C" class="td"/>
  <circle cx="610" cy="22"  r="1.2" fill="#E2E8F0" class="ta"/>
  <circle cx="40"  cy="290" r="1.0" fill="#C9A84C" class="tc"/>
  <circle cx="140" cy="490" r="1.2" fill="#E2E8F0" class="td"/>
  <circle cx="860" cy="385" r="1.0" fill="#3D8C8C" class="tb"/>
  <circle cx="300" cy="498" r="1.0" fill="#C9A84C" class="ta"/>
  <circle cx="30"  cy="155" r="1.2" fill="#E2E8F0" class="tc"/>

  <!-- ── Title (top) ────────────────────────────────────── -->
  <text x="450" y="70" font-family="Georgia,'Times New Roman',serif"
    font-size="72" font-weight="bold" fill="url(#gt)"
    text-anchor="middle" filter="url(#gg)" class="sh">METAPHY LLC</text>

  <text x="450" y="102" font-family="Georgia,'Times New Roman',serif"
    font-size="13" letter-spacing="6" fill="#3D8C8C" text-anchor="middle">
    METAPHYSICS AND COMPUTING</text>

  <line x1="200" y1="120" x2="700" y2="120" stroke="url(#dl)" stroke-width="0.8"/>

  <!-- ── Dodecahedron (center, R=140, center 450,295) ────── -->
  <!-- Halo rings -->
  <circle cx="450" cy="295" r="155" fill="none" stroke="#3D8C8C" stroke-width="0.5" class="p"/>
  <circle cx="450" cy="295" r="138" fill="none" stroke="#3D8C8C" stroke-width="0.3" class="p2"/>

  <!-- Outer pentagon: 450,155 583,252 532,408 368,408 317,252 -->
  <g class="sr">
    <polygon points="450,155 583,252 532,408 368,408 317,252"
      fill="none" stroke="#3D8C8C" stroke-width="1.4" opacity="0.85" filter="url(#tg)"/>
    <circle cx="450" cy="155" r="3.5" fill="#3D8C8C" opacity="0.9" filter="url(#tg)"/>
    <circle cx="583" cy="252" r="3.5" fill="#3D8C8C" opacity="0.9" filter="url(#tg)"/>
    <circle cx="532" cy="408" r="3.5" fill="#3D8C8C" opacity="0.9" filter="url(#tg)"/>
    <circle cx="368" cy="408" r="3.5" fill="#3D8C8C" opacity="0.9" filter="url(#tg)"/>
    <circle cx="317" cy="252" r="3.5" fill="#3D8C8C" opacity="0.9" filter="url(#tg)"/>
  </g>

  <!-- Inner pentagon: 502,224 534,322 450,383 366,322 398,224 -->
  <g class="srr">
    <polygon points="502,224 534,322 450,383 366,322 398,224"
      fill="rgba(201,168,76,0.04)" stroke="#C9A84C" stroke-width="1.1" opacity="0.85" filter="url(#gg)"/>
    <circle cx="502" cy="224" r="2.5" fill="#C9A84C" opacity="0.85" filter="url(#gg)"/>
    <circle cx="534" cy="322" r="2.5" fill="#C9A84C" opacity="0.85" filter="url(#gg)"/>
    <circle cx="450" cy="383" r="2.5" fill="#C9A84C" opacity="0.85" filter="url(#gg)"/>
    <circle cx="366" cy="322" r="2.5" fill="#C9A84C" opacity="0.85" filter="url(#gg)"/>
    <circle cx="398" cy="224" r="2.5" fill="#C9A84C" opacity="0.85" filter="url(#gg)"/>
  </g>

  <!-- Connecting edges (dodecahedron edges between pentagons) -->
  <g class="sr" opacity="0.28" stroke="#3D8C8C" stroke-width="0.7">
    <line x1="450" y1="155" x2="502" y2="224"/>
    <line x1="450" y1="155" x2="398" y2="224"/>
    <line x1="583" y1="252" x2="502" y2="224"/>
    <line x1="583" y1="252" x2="534" y2="322"/>
    <line x1="532" y1="408" x2="534" y2="322"/>
    <line x1="532" y1="408" x2="450" y2="383"/>
    <line x1="368" y1="408" x2="450" y2="383"/>
    <line x1="368" y1="408" x2="366" y2="322"/>
    <line x1="317" y1="252" x2="366" y2="322"/>
    <line x1="317" y1="252" x2="398" y2="224"/>
  </g>

  <!-- Small center pentagon: 450,253 490,282 475,329 425,329 410,282 -->
  <g class="ss">
    <polygon points="450,253 490,282 475,329 425,329 410,282"
      fill="rgba(61,140,140,0.07)" stroke="#3D8C8C" stroke-width="1.0" opacity="0.7" filter="url(#tg)"/>
  </g>

  <!-- Center node -->
  <circle cx="450" cy="295" r="6"  fill="#C9A84C" filter="url(#gg)"/>
  <circle cx="450" cy="295" r="12" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.4"/>
  <circle cx="450" cy="295" r="20" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.2"/>

  <!-- ── Footer taglines ────────────────────────────────── -->
  <line x1="200" y1="433" x2="700" y2="433" stroke="url(#dl)" stroke-width="0.6"/>

  <text x="450" y="455" font-family="Georgia,'Times New Roman',serif"
    font-size="14" fill="#D8D5CF" text-anchor="middle" opacity="0.85">
    Quantum Intelligence &#183; Photonic Systems &#183; Sacred Geometry
  </text>

  <text x="450" y="480" font-family="Georgia,'Times New Roman',serif"
    font-size="11" letter-spacing="3" fill="#3D8C8C" text-anchor="middle">
    &#11042; WHERE PHILOSOPHY MEETS ENGINEERING &#11042;
  </text>

  <text x="450" y="505" font-family="Georgia,'Times New Roman',serif"
    font-size="11" font-style="italic" fill="#94A3B8" text-anchor="middle">
    &#8220; Just because there is nothing there does not mean there is not a thing there. &#8221;
  </text>
</svg>